<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ứng dụng ghi hàng trả</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.9);
            --primary-grad: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
            --accent-color: #4f46e5;
        }
        body { 
            background: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #1e293b;
            padding-bottom: 50px;
        }
        .navbar {
            background: var(--primary-grad);
            border-radius: 0 0 24px 24px;
            padding: 20px 0;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .card {
            border: none;
            border-radius: 20px;
            background: var(--glass-bg);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
        }
        .card:hover { transform: translateY(-2px); }
        .btn-primary {
            background: var(--primary-grad);
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-weight: 600;
        }
        .stat-card {
            background: #fff;
            border-left: 5px solid #6366f1;
        }
        .badge-soft {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
        }
        /* Custom Table */
        .table thead th {
            background: #f1f5f9;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.05em;
            color: #64748b;
            border: none;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="{{ url_for('index') }}">
                <div class="bg-white rounded-3 p-1 me-2 shadow-sm">
                    <i class="bi bi-capsule text-primary fs-4"></i>
                </div>
                <span>Dược Hưng Phát ID</span>
            </a>
            <div class="text-white small fw-semibold opacity-75">Ứng dụng ghi hàng trả</div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
